name: Release Plugin ZIP

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Build ZIP with canonical folder name
        run: |
          mkdir -p build/mk-analytics-data
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            . build/mk-analytics-data/
          cd build && zip -r mk-analytics-data.zip mk-analytics-data/

      - name: Attach ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/mk-analytics-data.zip
